<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morning Dashboard</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #182343;
      --text: #e6ebff;
      --muted: #9aa8d9;
      --accent: #63a4ff;
      --ok: #4ade80;
      --warn: #f59e0b;
      --danger: #fb7185;
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 700px at 20% -10%, #1d2f5f 0%, var(--bg) 50%);
      color: var(--text);
      min-height: 100vh;
    }
    .app { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .header {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 14px;
    }
    .title { font-size: 20px; font-weight: 700; }
    .datetime { font-size: 14px; color: var(--muted); }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    input, button, select {
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--panel); color: var(--text); padding: 10px 12px;
    }
    button { cursor: pointer; background: var(--panel-2); }
    button:hover { border-color: rgba(255,255,255,0.3); }
    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } .week { grid-column: 1 / -1; } }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid var(--border); border-radius: 14px; padding: 16px;
    }
    .card h2 { margin: 0 0 12px; font-size: 16px; }
    .muted { color: var(--muted); font-size: 13px; }
    .temp { font-size: 46px; font-weight: 700; line-height: 1; }
    .row { display: flex; justify-content: space-between; gap: 8px; margin-top: 8px; }
    .event {
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
      border-radius: 10px; padding: 10px; margin-bottom: 8px;
    }
    .event small { color: var(--muted); }
    .week-table { width: 100%; border-collapse: collapse; }
    .week-table th, .week-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; }
    .pill { display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 12px; }
    .ok { background: rgba(74, 222, 128, 0.15); color: var(--ok); }
    .warn { background: rgba(245, 158, 11, 0.15); color: var(--warn); }
    .danger { background: rgba(251, 113, 133, 0.15); color: var(--danger); }
    .footer-note { margin-top: 10px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="title">Morning Dashboard</div>
        <div class="datetime" id="dateTime"></div>
      </div>
      <div class="muted" id="tz"></div>
    </div>

    <div class="controls">
      <button id="btnLocate">Use My Location</button>
      <input id="lat" placeholder="Lat" size="8" />
      <input id="lon" placeholder="Lon" size="8" />
      <button id="btnWeather">Refresh Weather</button>
      <input id="icsUrl" style="min-width:320px" placeholder="Public Apple Calendar ICS URL (optional)" />
      <button id="btnCal">Load Calendar</button>
    </div>

    <div class="grid">
      <section class="card" id="weatherNowCard">
        <h2>Current Weather</h2>
        <div class="muted" id="weatherLocation">No location set</div>
        <div class="temp" id="tempNow">--°</div>
        <div class="muted" id="weatherNowDesc">Set location to load current weather.</div>
        <div class="row">
          <div>High / Low</div>
          <div id="highLow">-- / --</div>
        </div>
      </section>

      <section class="card" id="eventsCard">
        <h2>Today’s Events</h2>
        <div id="eventsToday" class="muted">No events loaded yet.</div>
        <div class="footer-note">Tip: Apple Calendar on web needs a public ICS URL. If unavailable, add sample events below.</div>
      </section>

      <section class="card week">
        <h2>Next 7 Days (Weather + Events)</h2>
        <table class="week-table" id="weekTable">
          <thead><tr><th>Day</th><th>Weather</th><th>Events</th></tr></thead>
          <tbody></tbody>
        </table>
      </section>
    </div>
  </div>

  <script>
    const state = {
      lat: localStorage.getItem('lat') || '',
      lon: localStorage.getItem('lon') || '',
      weather: null,
      events: [],
      tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
    };

    const weatherCodeMap = {
      0: 'Clear', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast',
      45: 'Fog', 48: 'Rime fog', 51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
      61: 'Light rain', 63: 'Rain', 65: 'Heavy rain', 71: 'Light snow', 73: 'Snow', 75: 'Heavy snow',
      80: 'Rain showers', 81: 'Rain showers', 82: 'Violent rain showers', 95: 'Thunderstorm'
    };

    function formatDateTime(d = new Date()) {
      return new Intl.DateTimeFormat([], {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit'
      }).format(d);
    }

    function isoLocalDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,'0');
      const d = String(date.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }

    function tickClock() {
      document.getElementById('dateTime').textContent = formatDateTime();
      document.getElementById('tz').textContent = state.tz;
    }

    async function loadWeather() {
      if (!state.lat || !state.lon) return;
      localStorage.setItem('lat', state.lat); localStorage.setItem('lon', state.lon);
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${state.lat}&longitude=${state.lon}&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`;
      const res = await fetch(url);
      const data = await res.json();
      state.weather = data;
      renderWeather();
      renderWeek();
    }

    function renderWeather() {
      const w = state.weather;
      if (!w) return;
      document.getElementById('weatherLocation').textContent = `Lat ${state.lat}, Lon ${state.lon}`;
      document.getElementById('tempNow').textContent = `${Math.round(w.current.temperature_2m)}°`;
      document.getElementById('weatherNowDesc').textContent = weatherCodeMap[w.current.weather_code] || 'Unknown';
      document.getElementById('highLow').textContent = `${Math.round(w.daily.temperature_2m_max[0])}° / ${Math.round(w.daily.temperature_2m_min[0])}°`;
    }

    function parseICS(icsText) {
      const lines = icsText.split(/\r?\n/);
      const events = [];
      let cur = null;
      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (line === 'BEGIN:VEVENT') cur = {};
        else if (line === 'END:VEVENT' && cur) { events.push(cur); cur = null; }
        else if (cur && line.startsWith('SUMMARY:')) cur.summary = line.slice(8);
        else if (cur && line.startsWith('DTSTART')) cur.start = line.split(':')[1];
        else if (cur && line.startsWith('DTEND')) cur.end = line.split(':')[1];
      }
      return events.map(e => ({ ...e, startDate: parseICSTime(e.start), endDate: parseICSTime(e.end) })).filter(e => e.startDate);
    }

    function parseICSTime(v) {
      if (!v) return null;
      if (/^\d{8}$/.test(v)) return new Date(`${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}T00:00:00`);
      if (/^\d{8}T\d{6}Z$/.test(v)) return new Date(`${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}T${v.slice(9,11)}:${v.slice(11,13)}:${v.slice(13,15)}Z`);
      return null;
    }

    function renderEvents() {
      const root = document.getElementById('eventsToday');
      const today = isoLocalDate(new Date());
      const todays = state.events.filter(e => isoLocalDate(e.startDate) === today).sort((a,b)=>a.startDate-b.startDate);
      if (!todays.length) {
        root.innerHTML = '<span class="pill warn">No events found for today</span>';
      } else {
        root.innerHTML = todays.map(e => {
          const t = new Intl.DateTimeFormat([], { hour: 'numeric', minute: '2-digit' });
          return `<div class="event"><div>${e.summary || 'Untitled Event'}</div><small>${t.format(e.startDate)}${e.endDate ? ' - ' + t.format(e.endDate) : ''}</small></div>`;
        }).join('');
      }
    }

    function renderWeek() {
      const tbody = document.querySelector('#weekTable tbody');
      tbody.innerHTML = '';
      for (let i = 0; i < 7; i++) {
        const d = new Date(); d.setDate(d.getDate() + i);
        const key = isoLocalDate(d);
        const evCount = state.events.filter(e => isoLocalDate(e.startDate) === key).length;
        const day = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
        let weatherCell = '—';
        if (state.weather) {
          weatherCell = `${Math.round(state.weather.daily.temperature_2m_max[i])}°/${Math.round(state.weather.daily.temperature_2m_min[i])}° · ${weatherCodeMap[state.weather.daily.weather_code[i]] || ''}`;
        }
        const eventBadge = evCount === 0
          ? '<span class="pill ok">Free day</span>'
          : `<span class="pill danger">${evCount} event${evCount>1?'s':''}</span>`;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${day}</td><td>${weatherCell}</td><td>${eventBadge}</td>`;
        tbody.appendChild(tr);
      }
    }

    async function loadCalendar() {
      const url = document.getElementById('icsUrl').value.trim();
      if (!url) {
        state.events = [
          { summary: 'Sample: Team standup', startDate: new Date(new Date().setHours(9,0,0,0)), endDate: new Date(new Date().setHours(9,30,0,0)) },
          { summary: 'Sample: Workout', startDate: new Date(new Date().setHours(18,0,0,0)), endDate: new Date(new Date().setHours(19,0,0,0)) }
        ];
        renderEvents(); renderWeek();
        return;
      }
      try {
        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        const res = await fetch(proxy);
        const txt = await res.text();
        state.events = parseICS(txt);
        renderEvents();
        renderWeek();
      } catch (e) {
        document.getElementById('eventsToday').innerHTML = '<span class="pill danger">Could not load ICS URL (check it is public).</span>';
      }
    }

    document.getElementById('btnLocate').onclick = () => {
      navigator.geolocation.getCurrentPosition((pos) => {
        state.lat = pos.coords.latitude.toFixed(4);
        state.lon = pos.coords.longitude.toFixed(4);
        document.getElementById('lat').value = state.lat;
        document.getElementById('lon').value = state.lon;
        loadWeather();
      });
    };

    document.getElementById('btnWeather').onclick = () => {
      state.lat = document.getElementById('lat').value.trim();
      state.lon = document.getElementById('lon').value.trim();
      loadWeather();
    };
    document.getElementById('btnCal').onclick = loadCalendar;

    // init
    document.getElementById('lat').value = state.lat;
    document.getElementById('lon').value = state.lon;
    tickClock();
    setInterval(tickClock, 1000);
    renderWeek();
    if (state.lat && state.lon) loadWeather();
    loadCalendar();
  </script>
</body>
</html>
