<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Periodization Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:#0b0b13;color:#e2e8f0;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2d2d4a;border-radius:99px}
#app{max-width:1100px;margin:0 auto;padding:36px 22px 72px}

/* ── Editable spans ── */
.ev{cursor:pointer;border-radius:3px;padding:1px 3px;margin:-1px -3px;transition:background .15s;display:inline}
.ev:hover{background:rgba(99,102,241,.15)}
.ev:hover::after{content:' ✏';font-size:9px;opacity:.45;vertical-align:super}
.edit-inp{background:rgba(10,10,20,.95);border:1.5px solid rgba(130,120,255,.6);border-radius:5px;color:#e8eaf0;font-family:inherit;outline:none;padding:3px 8px;transition:border .15s}
.edit-inp:focus{border-color:#818cf8;box-shadow:0 0 0 2px rgba(99,102,241,.18)}
textarea.edit-inp{resize:vertical;width:100%;display:block;line-height:1.5}

/* ── Top bar ── */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.topbar-left .t1{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#4f46e5}
.topbar-left .t2{font-size:12px;color:rgba(255,255,255,.25);margin-top:3px}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-settings{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.45);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-settings:hover{background:rgba(255,255,255,.1);color:#fff}
.progress-wrap{display:flex;align-items:center;gap:12px}
.progress-text{text-align:right}
.prog-lbl{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:2px}
.prog-pct{font-size:22px;font-weight:800;color:#818cf8}
.prog-sub{font-size:11px;color:rgba(255,255,255,.2)}
.prog-ring{width:52px;height:52px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.prog-ring-inner{width:40px;height:40px;border-radius:50%;background:#0b0b13}

/* ── Action buttons ── */
.action-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.btn-a{border-radius:9px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;border:1px solid;letter-spacing:.02em}
.btn-a:hover{transform:translateY(-1px);opacity:.85}
.btn-reset{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.55)}
.btn-save-h{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.35);color:#fbbf24}
.btn-new{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.btn-hist{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:#6ee7b7;margin-left:auto}
.hist-badge{background:rgba(52,211,153,.25);border-radius:99px;padding:1px 7px;margin-left:4px;font-size:11px}

/* ── Macro panel ── */
.macro-panel{background:linear-gradient(135deg,rgba(79,70,229,.13) 0%,rgba(99,102,241,.05) 100%);border:1px solid rgba(99,102,241,.3);border-radius:18px;padding:28px 32px;margin-bottom:28px;position:relative;overflow:hidden;display:flex;gap:48px;flex-wrap:wrap}
.macro-glow{position:absolute;top:-80px;right:-80px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.13) 0%,transparent 70%);pointer-events:none}
.macro-left{flex:1 1 300px;min-width:0}
.macro-right{flex:1 1 260px}
.sec-lbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#818cf8;margin-bottom:10px}
.macro-goal-wrap{font-size:27px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:10px}
.macro-tl-wrap{font-size:13px;color:rgba(255,255,255,.38);margin-bottom:8px}
.macro-desc-wrap{font-size:13px;color:rgba(255,255,255,.45);line-height:1.55}
.ms-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.ms-dot{width:7px;height:7px;border-radius:50%;background:#4f46e5;flex-shrink:0}
.ms-text{flex:1;font-size:13px;color:#cbd5e1}
.btn-rm-ms{background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:18px;line-height:1;padding:0 3px;transition:color .15s}
.btn-rm-ms:hover{color:rgba(255,100,100,.6)}
.add-ms-row{display:flex;gap:6px;margin-top:8px}
.add-ms-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:#e2e8f0;font-size:13px;padding:6px 10px;outline:none;font-family:inherit}
.add-ms-inp:focus{border-color:rgba(99,102,241,.5)}
.btn-add-ms{background:rgba(99,102,241,.25);border:1px solid rgba(99,102,241,.4);color:#a5b4fc;border-radius:7px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-add-ms:hover{opacity:.8}

/* ── Meso ── */
.meso-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.meso-lbl{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.btn-add-mo{background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.22);color:rgba(255,255,255,.45);border-radius:8px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-add-mo:hover{opacity:.75}
.month-cards{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px}
.month-card{position:relative;flex:0 0 196px;border-radius:14px;padding:16px 16px 14px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025)}
.month-card:hover{transform:translateY(-2px)}
.card-topline{position:absolute;top:0;left:20%;right:20%;height:2px;border-radius:0 0 2px 2px}
.card-hdr{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.28);display:flex;justify-content:space-between;margin-bottom:6px}
.card-goal{font-size:13px;font-weight:600;color:#94a3b8;line-height:1.45;margin-bottom:10px;min-height:38px}
.card-goal.sel{color:#fff}
.card-tag{display:inline-block;padding:3px 11px;border-radius:99px;font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.card-pb{background:rgba(255,255,255,.08);border-radius:99px;height:3px}
.card-pf{height:100%;border-radius:99px;transition:width .35s}
.card-ps{font-size:10px;color:rgba(255,255,255,.25);margin-top:5px}
.btn-rm-card{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.35);border-radius:4px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;line-height:1;font-family:inherit;opacity:0;transition:opacity .15s}
.month-card:hover .btn-rm-card{opacity:1}

/* ── Micro detail ── */
.micro-detail{margin-top:20px;border-radius:16px;padding:24px 28px;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.micro-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.micro-mlbl{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.micro-goal{font-size:21px;font-weight:700;color:#fff}
.btn-cycle{border-radius:99px;padding:6px 16px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:inherit;transition:opacity .15s;border:1px solid transparent}
.btn-cycle:hover{opacity:.8}
.micro-hints{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px;font-size:11px;color:rgba(255,255,255,.28)}
.hint-dl{color:rgba(234,179,8,.55)}
.week-row{display:flex;gap:13px;align-items:flex-start;padding:13px 16px;border-radius:10px;margin-bottom:7px;transition:filter .15s}
.week-row:hover{filter:brightness(1.07)}
.week-cb{width:20px;height:20px;border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;border:2px solid;user-select:none;-webkit-user-select:none}
.week-cb:hover{transform:scale(1.12)}
.week-badge{flex-shrink:0;width:58px;padding-top:2px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;line-height:1.4;text-align:center}
.week-focus{font-size:14px;font-weight:500;margin-bottom:5px}
.week-deliv{display:flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,.32)}
.week-content{flex:1;min-width:0}

/* ── Modals ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:900;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.mbox{background:#13131e;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:32px 36px;max-width:520px;width:92%;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:fadeUp .2s ease}
.mtitle{font-size:20px;font-weight:800;color:#fff;margin-bottom:10px}
.mdesc{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:24px}
.mbtns{display:flex;gap:10px;flex-wrap:wrap}
.mbtn{flex:1;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid;transition:all .15s;min-width:110px;text-align:center}
.mbtn:hover{transform:translateY(-1px)}
.mb-ok{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.5);color:#a5b4fc}
.mb-cancel{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.5)}
.mb-danger{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#fca5a5}
.mb-gold{background:rgba(251,191,36,.15);border-color:rgba(251,191,36,.4);color:#fbbf24}

/* ── Wizard ── */
.wiz-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .2s ease}
.wiz-box{background:#13131e;border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:40px 44px;max-width:620px;width:94%;max-height:90vh;overflow-y:auto;box-shadow:0 32px 100px rgba(0,0,0,.7);animation:fadeUp .25s ease;position:relative}
.wiz-step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:32px}
.wiz-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .2s}
.wiz-dot.active{background:#818cf8;width:20px;border-radius:3px}
.wiz-dot.done{background:#4f46e5}
.wiz-title{font-size:24px;font-weight:800;color:#fff;margin-bottom:10px;line-height:1.3}
.wiz-sub{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:28px;line-height:1.55}
.wiz-inp{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);border-radius:11px;color:#e8eaf0;font-size:15px;padding:14px 16px;outline:none;font-family:inherit;transition:border .15s;resize:none}
.wiz-inp:focus{border-color:rgba(99,102,241,.6);background:rgba(99,102,241,.07)}
.wiz-inp::placeholder{color:rgba(255,255,255,.25)}
.wiz-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px;margin-top:20px}
.wiz-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.wiz-chip{padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);transition:all .15s;font-family:inherit}
.wiz-chip:hover{border-color:rgba(99,102,241,.4);color:#a5b4fc}
.wiz-chip.on{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.6);color:#a5b4fc}
.wiz-mo-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.wiz-mo{width:44px;height:36px;border-radius:8px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center}
.wiz-mo:hover{border-color:rgba(99,102,241,.4);color:#a5b4fc}
.wiz-mo.on{background:rgba(99,102,241,.22);border-color:rgba(99,102,241,.65);color:#a5b4fc}
.wiz-btns{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}
.wiz-btn{flex:1;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;border:1px solid;transition:all .15s;text-align:center;letter-spacing:.01em}
.wiz-btn:hover{transform:translateY(-1px);opacity:.9}
.wiz-btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-color:transparent;color:#fff}
.wiz-btn-ghost{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.5)}
.wiz-btn-back{background:none;border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.35)}
.wiz-close{position:absolute;top:18px;right:20px;background:none;border:none;color:rgba(255,255,255,.3);font-size:22px;cursor:pointer;line-height:1;padding:4px;transition:color .15s}
.wiz-close:hover{color:#fff}

/* ── Loading ── */
.loading-wrap{text-align:center;padding:40px 20px}
.spinner{width:48px;height:48px;border:3px solid rgba(99,102,241,.2);border-top-color:#818cf8;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:16px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:8px}
.loading-sub{font-size:13px;color:rgba(255,255,255,.3)}
.loading-dots::after{content:'...';animation:dots 1.4s infinite;display:inline-block;width:20px;text-align:left}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* ── Preview ── */
.preview-goal{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.4}
.preview-tl{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:20px}
.preview-months{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;padding-right:4px}
.prev-mo{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07)}
.prev-mo-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.3);width:60px;flex-shrink:0}
.prev-mo-goal{font-size:14px;font-weight:600;color:#e2e8f0;flex:1}
.prev-mo-tag{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:2px 9px;border-radius:99px;flex-shrink:0}

/* ── Settings ── */
.settings-field{margin-bottom:20px}
.settings-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
.settings-inp{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);border-radius:9px;color:#e8eaf0;font-size:14px;padding:10px 14px;outline:none;font-family:inherit;transition:border .15s}
.settings-inp:focus{border-color:rgba(99,102,241,.6)}
.settings-note{font-size:12px;color:rgba(255,255,255,.3);margin-top:6px;line-height:1.5}
.api-key-status{font-size:12px;margin-top:4px}

/* ── Multi-user info ── */
.mu-section{margin-top:48px;border-top:1px solid rgba(255,255,255,.06);padding-top:40px}
.mu-title{font-size:14px;font-weight:800;color:rgba(255,255,255,.6);margin-bottom:6px}
.mu-sub{font-size:13px;color:rgba(255,255,255,.3);margin-bottom:24px}
.mu-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.mu-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:20px;transition:border .2s}
.mu-card:hover{border-color:rgba(255,255,255,.13)}
.mu-icon{font-size:24px;margin-bottom:10px}
.mu-card-title{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:6px}
.mu-card-desc{font-size:12px;color:rgba(255,255,255,.38);line-height:1.6;margin-bottom:12px}
.mu-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 9px;border-radius:99px}
.mu-steps{font-size:12px;color:rgba(255,255,255,.35);line-height:1.8;margin-top:8px;padding-left:4px}
.mu-steps li{margin-left:12px;list-style:decimal}

/* ── History ── */
.history-section{margin-top:40px}
.history-title{font-size:14px;font-weight:800;color:rgba(255,255,255,.7);margin-bottom:20px}
.hist-empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,.2);font-size:14px;border:1px dashed rgba(255,255,255,.08);border-radius:14px}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.hist-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;position:relative;transition:all .2s}
.hist-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.13)}
.h-trophy{font-size:22px;margin-bottom:10px}
.h-date{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px}
.h-goal{font-size:16px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:6px}
.h-tl{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:14px}
.h-comp{display:inline-flex;align-items:center;gap:6px;border-radius:99px;padding:3px 12px;font-size:12px;font-weight:700;margin-bottom:14px}
.h-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.h-pill{font-size:10px;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
.h-ms{font-size:12px;color:rgba(255,255,255,.35)}
.h-ms-item{display:flex;gap:6px;align-items:flex-start;margin-bottom:4px}
.btn-rm-hist{position:absolute;top:12px;right:12px;background:none;border:none;color:rgba(255,255,255,.18);cursor:pointer;font-size:16px;padding:0 4px;transition:color .15s}
.btn-rm-hist:hover{color:rgba(255,100,100,.6)}

/* ── Legend ── */
.legend{margin-top:32px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.28)}
.legend-dot{width:7px;height:7px;border-radius:50%}

/* ── Error ── */
.err-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:14px 16px;font-size:13px;color:#fca5a5;line-height:1.6;margin-top:16px}
.err-box code{font-size:12px;opacity:.75;font-family:monospace}

/* ── Welcome screen ── */
.welcome-ov{position:fixed;inset:0;background:rgba(6,6,14,.92);display:flex;align-items:center;justify-content:center;z-index:1100;animation:fadeIn .3s ease;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.welcome-box{max-width:580px;width:94%;text-align:center;padding:56px 44px;position:relative;animation:fadeUp .35s ease}
.welcome-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:500px;height:400px;border-radius:50%;background:radial-gradient(ellipse,rgba(99,102,241,.18) 0%,transparent 70%);pointer-events:none}
.welcome-tag{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#818cf8;border:1px solid rgba(99,102,241,.35);border-radius:99px;padding:4px 14px;margin-bottom:28px;background:rgba(99,102,241,.1)}
.welcome-title{font-size:42px;font-weight:900;color:#fff;line-height:1.15;margin-bottom:16px;letter-spacing:-.02em}
.welcome-title span{background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="wiz-root"></div>

<script>
// ── Theme palette ──────────────────────────────────────────────────────────────
const THEMES=['Build','Connect','Perform','Learn','Launch','Review'];
const T={
  Build:  {bg:'rgba(79,70,229,.1)',  border:'rgba(99,102,241,.38)',  accent:'#818cf8',tag:'rgba(99,102,241,.22)', tagTxt:'#a5b4fc', glow:'rgba(99,102,241,.18)'},
  Connect:{bg:'rgba(6,182,212,.09)', border:'rgba(6,182,212,.35)',   accent:'#22d3ee',tag:'rgba(6,182,212,.2)',   tagTxt:'#67e8f9', glow:'rgba(6,182,212,.15)'},
  Perform:{bg:'rgba(34,197,94,.09)', border:'rgba(34,197,94,.35)',   accent:'#4ade80',tag:'rgba(34,197,94,.2)',   tagTxt:'#86efac', glow:'rgba(34,197,94,.15)'},
  Learn:  {bg:'rgba(168,85,247,.09)',border:'rgba(168,85,247,.35)',  accent:'#c084fc',tag:'rgba(168,85,247,.2)',  tagTxt:'#d8b4fe', glow:'rgba(168,85,247,.15)'},
  Launch: {bg:'rgba(249,115,22,.09)',border:'rgba(251,146,60,.35)',  accent:'#fb923c',tag:'rgba(249,115,22,.2)',  tagTxt:'#fdba74', glow:'rgba(249,115,22,.15)'},
  Review: {bg:'rgba(234,179,8,.09)', border:'rgba(234,179,8,.35)',   accent:'#facc15',tag:'rgba(234,179,8,.2)',   tagTxt:'#fde047', glow:'rgba(234,179,8,.15)'},
};
const ts=t=>T[t]||T.Build;

// ── State ──────────────────────────────────────────────────────────────────────
let SEL=0, SHOW_HIST=false, NEXT_ID=200, HISTORY=[];

let S={
  macro:{
    goal:'Get promoted to Senior Product Manager',
    timeline:'12 months  ·  Mar 2026 → Mar 2027',
    description:'Build the skills, visibility, and track record to earn a senior title and larger-scope work.',
    milestones:['Complete a PM leadership course or certification','Ship 2 major product features end-to-end','Grow professional network to 50+ relevant contacts','Earn a strong mid-year performance review'],
  },
  months:[
    {id:1,label:'Month 1',date:'Mar 2026',goal:'Skill Audit & Foundation',theme:'Build',weeks:[
      {id:1,focus:'Audit skill gaps vs. senior PM job descriptions',deliverable:'Skills gap doc',done:false},
      {id:2,focus:'Start PM leadership course + read 1 relevant book',deliverable:'Chapter notes',done:false},
      {id:3,focus:'Document 2 past wins as mini case studies',deliverable:'Draft case studies',done:false},
      {id:4,focus:'Review & consolidate — rest from output, plan Month 2',deliverable:'Month 1 retro',done:false,isDeload:true},
    ]},
    {id:2,label:'Month 2',date:'Apr 2026',goal:'Portfolio & Proof of Work',theme:'Build',weeks:[
      {id:1,focus:'Start a personal product project (problem → solution)',deliverable:'Project brief',done:false},
      {id:2,focus:'Write a full PRD for the project',deliverable:'Draft PRD',done:false},
      {id:3,focus:'Polish case studies, create or update portfolio',deliverable:'Live portfolio',done:false},
      {id:4,focus:'Review & consolidate — light reading, no heavy output',deliverable:'Month 2 retro',done:false,isDeload:true},
    ]},
    {id:3,label:'Month 3',date:'May 2026',goal:'Network & Visibility',theme:'Connect',weeks:[
      {id:1,focus:'Reach out to 5 senior PMs for informational conversations',deliverable:'5 scheduled chats',done:false},
      {id:2,focus:'Attend 1 PM event or conference (virtual ok)',deliverable:'Event takeaways doc',done:false},
      {id:3,focus:'Publish 1 post or article sharing a PM insight',deliverable:'Published post',done:false},
      {id:4,focus:'Review & consolidate — pause outreach, reflect on connections',deliverable:'Month 3 retro',done:false,isDeload:true},
    ]},
    {id:4,label:'Month 4',date:'Jun 2026',goal:'Leadership & Execution',theme:'Perform',weeks:[
      {id:1,focus:'Volunteer to lead a cross-functional project or initiative',deliverable:'Project plan + kickoff',done:false},
      {id:2,focus:'Execute and ship — unblock team, run standups, drive decisions',deliverable:'Mid-project update',done:false},
      {id:3,focus:'Present results to stakeholders, gather structured feedback',deliverable:'Presentation deck',done:false},
      {id:4,focus:'Review & consolidate — celebrate wins, rest, plan next phase',deliverable:'Month 4 retro',done:false,isDeload:true},
    ]},
  ],
};

// ── Utils ──────────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function totalWks(){return S.months.reduce((a,m)=>a+m.weeks.length,0)}
function doneWks(){return S.months.reduce((a,m)=>a+m.weeks.filter(w=>w.done).length,0)}
function pctAll(){const t=totalWks();return t>0?Math.round(doneWks()/t*100):0}
function clone(o){return JSON.parse(JSON.stringify(o))}
function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function pathSet(p,v){const parts=p.split('.').map(k=>isNaN(k)?k:+k);const last=parts.pop();const obj=parts.reduce((o,k)=>o[k],S);if(obj!=null)obj[last]=v}
function pathGet(p){return p.split('.').map(k=>isNaN(k)?k:+k).reduce((o,k)=>o&&o[k],S)}

// ── Inline edit (replaces contenteditable) ─────────────────────────────────────
function startEdit(el){
  if(el.querySelector('input,textarea'))return;
  const path=el.dataset.path;
  const multi=el.dataset.multi==='1';
  const val=String(pathGet(path)||'');
  const inp=document.createElement(multi?'textarea':'input');
  inp.className='edit-inp';
  inp.value=val;
  if(multi){inp.rows=3;inp.style.minWidth='200px'}
  else{inp.style.minWidth=Math.max(el.offsetWidth,80)+'px';inp.style.fontSize=getComputedStyle(el).fontSize;inp.style.fontWeight=getComputedStyle(el).fontWeight}
  el.style.visibility='hidden';
  el.parentNode.insertBefore(inp,el.nextSibling);
  inp.focus();inp.select();
  let saved=false;
  const save=()=>{
    if(saved)return;saved=true;
    const nv=inp.value.trim();
    inp.remove();el.style.visibility='';
    if(nv&&nv!==val){
      pathSet(path,nv);
      if(path.match(/\.goal$|^macro\./)){render();return}
      el.textContent=nv;
    }
  };
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{
    if(!multi&&e.key==='Enter'){e.preventDefault();save()}
    if(e.key==='Escape'){saved=true;inp.remove();el.style.visibility=''}
  });
}

// ── Editable value span builder ────────────────────────────────────────────────
function ev(path,text,opts){
  const multi=opts&&opts.multi?'data-multi="1"':'';
  const style=opts&&opts.style?`style="${opts.style}"`:'';
  return `<span class="ev" ${multi} data-path="${path}" onclick="startEdit(this)" ${style}>${esc(text)}</span>`;
}

// ── Global action functions ────────────────────────────────────────────────────
function toggleWeek(mi,wi){S.months[mi].weeks[wi].done=!S.months[mi].weeks[wi].done;render()}
function selectMonth(i){if(SEL!==i){SEL=i;render()}}
function removeMonth(i){S.months.splice(i,1);SEL=Math.min(SEL,S.months.length-1);render()}
function cycleTheme(mi){const c=S.months[mi].theme;S.months[mi].theme=THEMES[(THEMES.indexOf(c)+1)%THEMES.length];render()}
function addMonth(){
  const n=S.months.length;
  S.months.push({id:++NEXT_ID,label:'Month '+(n+1),date:'',goal:'New phase goal',theme:'Build',weeks:[
    {id:1,focus:'Week 1 focus area',deliverable:'Deliverable',done:false},
    {id:2,focus:'Week 2 focus area',deliverable:'Deliverable',done:false},
    {id:3,focus:'Week 3 focus area',deliverable:'Deliverable',done:false},
    {id:4,focus:'Review & consolidate — rest, reflect, plan next month',deliverable:'Monthly retro',done:false,isDeload:true},
  ]});
  SEL=n;render();
}
function addMilestone(){const inp=document.getElementById('ms-inp');const v=inp?inp.value.trim():'';if(v){S.macro.milestones.push(v);render()}}
function removeMilestone(i){S.macro.milestones.splice(i,1);render()}
function toggleHistory(){SHOW_HIST=!SHOW_HIST;render()}
function removeHistory(i){HISTORY.splice(i,1);render()}
function doReset(){S.months.forEach(m=>m.weeks.forEach(w=>{w.done=false}));render()}
function doSaveHistory(){HISTORY.unshift({savedAt:Date.now(),macro:clone(S.macro),months:clone(S.months)});SHOW_HIST=true;render();setTimeout(()=>{const el=document.querySelector('.history-section');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},60)}
function doClearForNew(save){
  if(save)HISTORY.unshift({savedAt:Date.now(),macro:clone(S.macro),months:clone(S.months)});
  S={macro:{goal:'Your New Goal',timeline:'Timeframe · Start → End',description:'Describe your goal here.',milestones:['Key milestone 1','Key milestone 2']},months:[{id:++NEXT_ID,label:'Month 1',date:'',goal:'Phase 1 goal',theme:'Build',weeks:[{id:1,focus:'Week 1 focus',deliverable:'Deliverable',done:false},{id:2,focus:'Week 2 focus',deliverable:'Deliverable',done:false},{id:3,focus:'Week 3 focus',deliverable:'Deliverable',done:false},{id:4,focus:'Review & consolidate — rest, reflect, plan next month',deliverable:'Monthly retro',done:false,isDeload:true}]}]};
  SEL=0;SHOW_HIST=save;render();window.scrollTo({top:0,behavior:'smooth'});
}

// ── Confirm modals ─────────────────────────────────────────────────────────────
function openModal(html){document.getElementById('modal-root').innerHTML=`<div class="ov" onclick="if(event.target===this)closeModal()">${html}</div>`}
function closeModal(){document.getElementById('modal-root').innerHTML=''}
function handleReset(){const d=doneWks();if(!d)return;openModal(`<div class="mbox"><div class="mtitle">Reset All Progress?</div><div class="mdesc">Unchecks all <strong>${d}</strong> completed week${d!==1?'s':''} across every month. Goal text and structure stay intact.</div><div class="mbtns"><button class="mbtn mb-ok" onclick="closeModal();doReset()">↺ Reset</button><button class="mbtn mb-cancel" onclick="closeModal()">Cancel</button></div></div>`)}
function handleSaveHistory(){openModal(`<div class="mbox"><div class="mtitle">Save to Accomplishments?</div><div class="mdesc">Saves a snapshot of <strong>"${esc(S.macro.goal)}"</strong> at ${pctAll()}% completion. You can keep working on it after saving.</div><div class="mbtns"><button class="mbtn mb-gold" onclick="closeModal();doSaveHistory()">🏆 Save Snapshot</button><button class="mbtn mb-cancel" onclick="closeModal()">Cancel</button></div></div>`)}
function handleNewGoal(){ openWizard(); }

// ── Settings (no API key needed — handled server-side) ─────────────────────────
function showSettings(){
  openModal(`<div class="mbox">
    <div class="mtitle">⚙ Settings</div>
    <div class="mdesc" style="margin-bottom:16px">The AI is powered by a secure backend — no API key needed here. Your progress is stored in this browser session.</div>
    <div class="mbtns"><button class="mbtn mb-cancel" onclick="closeModal()">Close</button></div>
  </div>`);
}

// ── Wizard state & functions ───────────────────────────────────────────────────
let WIZ={step:1,goal:'',domain:'',months:3,notes:'',loading:false,error:'',preview:null};
const DOMAINS=[{icon:'🏃',label:'Fitness & Health'},{icon:'💼',label:'Career & Work'},{icon:'📚',label:'Learning & Skills'},{icon:'🎨',label:'Creative Projects'},{icon:'🚀',label:'Business & Startups'},{icon:'💪',label:'Personal Growth'}];

function openWizard(){WIZ={step:1,goal:'',domain:'',months:3,notes:'',loading:false,error:'',preview:null};renderWizard()}
function closeWizard(){document.getElementById('wiz-root').innerHTML=''}

function renderWizard(){
  const wr=document.getElementById('wiz-root');
  if(WIZ.loading){wr.innerHTML=`<div class="wiz-ov"><div class="wiz-box" style="max-width:420px;text-align:center"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">Crafting your plan<span class="loading-dots"></span></div><div class="loading-sub">Claude is designing your personalized periodization plan</div></div></div></div>`;return}
  let content='';
  const dots=Array.from({length:3},(_,i)=>`<div class="wiz-dot${WIZ.step===i+1?' active':WIZ.step>i+1?' done':''}"></div>`).join('');

  if(WIZ.step===1){
    content=`<div class="wiz-title">✦ Let's build your plan</div>
    <div class="wiz-sub">Describe your goal in one sentence. The more specific, the better your plan.</div>
    <textarea class="wiz-inp" id="wiz-goal" rows="3" placeholder="e.g. Run my first marathon in 6 months, Launch a freelance design business, Learn to play jazz guitar…">${esc(WIZ.goal)}</textarea>
    <div class="wiz-btns">
      <button class="wiz-btn wiz-btn-primary" onclick="wizNext()">Build with AI →</button>
      <button class="wiz-btn wiz-btn-ghost" onclick="wizManual()">Build manually</button>
    </div>`;
  }
  else if(WIZ.step===2){
    const chips=DOMAINS.map(d=>`<button class="wiz-chip${WIZ.domain===d.label?' on':''}" onclick="WIZ.domain='${d.label}';renderWizard()">${d.icon} ${d.label}</button>`).join('');
    const mos=Array.from({length:12},(_,i)=>`<button class="wiz-mo${WIZ.months===i+1?' on':''}" onclick="WIZ.months=${i+1};renderWizard()">${i+1}</button>`).join('');
    content=`<div class="wiz-title">Tell me more</div>
    <div class="wiz-sub">A few quick details help Claude build the right structure for you.</div>
    <div class="wiz-lbl">Domain</div>
    <div class="wiz-chips">${chips}</div>
    <div class="wiz-lbl">How many months?</div>
    <div class="wiz-mo-btns">${mos}</div>
    <div class="wiz-lbl">Anything else to consider? <span style="opacity:.4">(optional)</span></div>
    <textarea class="wiz-inp" id="wiz-notes" rows="2" placeholder="e.g. I can only train 3x/week, I have a full-time job, I'm a complete beginner…">${esc(WIZ.notes)}</textarea>
    ${WIZ.error?`<div class="err-box">${WIZ.error}</div>`:''}
    <div class="wiz-btns">
      <button class="wiz-btn wiz-btn-primary" onclick="wizGenerate()">Generate my plan ✦</button>
      <button class="wiz-btn wiz-btn-back" onclick="WIZ.step=1;renderWizard()">← Back</button>
    </div>`;
  }
  else if(WIZ.step===3&&WIZ.preview){
    const p=WIZ.preview;
    const prevMonths=p.months.map(m=>{const s=ts(m.theme);return`<div class="prev-mo"><div class="prev-mo-label">${esc(m.label)}</div><div class="prev-mo-goal">${esc(m.goal)}</div><span class="prev-mo-tag" style="background:${s.tag};color:${s.tagTxt}">${esc(m.theme)}</span></div>`}).join('');
    content=`<div class="wiz-title">Here's your plan 🎯</div>
    <div class="preview-goal">${esc(p.macro.goal)}</div>
    <div class="preview-tl">${esc(p.macro.timeline)}</div>
    <div class="preview-months">${prevMonths}</div>
    ${WIZ.error?`<div class="err-box">${WIZ.error}</div>`:''}
    <div class="wiz-btns" style="margin-top:20px">
      <button class="wiz-btn wiz-btn-primary" onclick="applyPlan()">Looks great, let's go! →</button>
      <button class="wiz-btn wiz-btn-ghost" onclick="WIZ.step=2;renderWizard()">← Regenerate</button>
      <button class="wiz-btn wiz-btn-back" onclick="closeWizard()">Cancel</button>
    </div>`;
  }

  wr.innerHTML=`<div class="wiz-ov" onclick="if(event.target===this)closeWizard()"><div class="wiz-box">
    <button class="wiz-close" onclick="closeWizard()">×</button>
    <div class="wiz-step-dots">${dots}</div>
    ${content}
  </div></div>`;

  // Focus first input after render
  setTimeout(()=>{const f=document.querySelector('.wiz-box textarea, .wiz-box input:not([type=button])');if(f&&WIZ.step<=2)f.focus()},50);
}

function wizNext(){
  const g=document.getElementById('wiz-goal');
  if(g)WIZ.goal=g.value.trim();
  if(!WIZ.goal){const el=document.getElementById('wiz-goal');if(el){el.style.borderColor='rgba(239,68,68,.6)';el.focus()}return}
  WIZ.step=2;renderWizard();
}

function wizManual(){
  const g=document.getElementById('wiz-goal');
  if(g&&g.value.trim())WIZ.goal=g.value.trim();
  closeWizard();
  doClearForNew(false);
  // Pre-fill goal if they typed one
  if(WIZ.goal){S.macro.goal=WIZ.goal;render()}
}

async function wizGenerate(){
  const notesEl=document.getElementById('wiz-notes');
  if(notesEl)WIZ.notes=notesEl.value.trim();
  if(!WIZ.domain){WIZ.error='Please pick a domain above.';renderWizard();return}
  WIZ.error='';WIZ.loading=true;renderWizard();

  const now=new Date();
  const MONTH_NAMES=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const startStr=`${MONTH_NAMES[now.getMonth()]} ${now.getFullYear()}`;

  const prompt=`You are a goal planning coach. Create a detailed periodization plan as a single JSON object.

User goal: "${WIZ.goal}"
Domain: ${WIZ.domain}
Duration: ${WIZ.months} month${WIZ.months>1?'s':''}
Starting: ${startStr}
Extra context: ${WIZ.notes||'none'}

Rules:
- Week 4 of EVERY month is always a deload week (isDeload: true) — rest, review, and planning only
- Themes must be exactly one of: Build, Connect, Perform, Learn, Launch, Review
- Each week has a specific actionable focus and a concrete deliverable
- Milestones should be measurable outcomes
- Be specific and practical, not generic

Return ONLY valid JSON, no markdown, no explanation:
{
  "macro": {
    "goal": "concise goal (under 10 words)",
    "timeline": "${WIZ.months} months · ${startStr} → [calculate end month/year]",
    "description": "2 motivating sentences about this journey",
    "milestones": ["outcome 1", "outcome 2", "outcome 3", "outcome 4"]
  },
  "months": [
    {
      "label": "Month 1",
      "date": "${startStr}",
      "goal": "phase goal (5-7 words)",
      "theme": "Build",
      "weeks": [
        {"focus": "Specific week 1 action", "deliverable": "Concrete output", "isDeload": false},
        {"focus": "Specific week 2 action", "deliverable": "Concrete output", "isDeload": false},
        {"focus": "Specific week 3 action", "deliverable": "Concrete output", "isDeload": false},
        {"focus": "Review progress, rest, plan next month", "deliverable": "Monthly retro notes", "isDeload": true}
      ]
    }
  ]
}`;

  try{
    // Calls our own Vercel serverless function — API key stays on the server
    const res=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt})
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error||`Server error ${res.status}`);
    }
    const data=await res.json();
    const text=data.content?.[0]?.text||'';
    const jsonMatch=text.match(/\{[\s\S]*\}/);
    if(!jsonMatch)throw new Error('No JSON found in response');
    const plan=JSON.parse(jsonMatch[0]);
    plan.months=plan.months.map((m,mi)=>({...m,id:++NEXT_ID,weeks:m.weeks.map((w,wi)=>({...w,id:wi+1,done:false}))}));
    WIZ.preview=plan;WIZ.loading=false;WIZ.step=3;renderWizard();
  }catch(err){
    WIZ.loading=false;WIZ.error=`<strong>Error:</strong> ${esc(err.message)}<br><br>Make sure you've set the <code>ANTHROPIC_API_KEY</code> environment variable in your Vercel project settings.`;
    WIZ.step=2;renderWizard();
  }
}

function applyPlan(){
  if(!WIZ.preview)return;
  const save=doneWks()>0;
  if(save)HISTORY.unshift({savedAt:Date.now(),macro:clone(S.macro),months:clone(S.months)});
  S={macro:WIZ.preview.macro,months:WIZ.preview.months};
  SEL=0;closeWizard();render();window.scrollTo({top:0,behavior:'smooth'});
}

// ── HTML builders ──────────────────────────────────────────────────────────────
function buildTopBar(){
  const p=pctAll(),deg=p*3.6;
  const keyStatus='<span style="color:#6ee7b7;font-size:10px;margin-left:6px">✦ AI</span>';
  return `<div class="topbar">
    <div class="topbar-left">
      <div class="t1">Goal Periodization Dashboard${keyStatus}</div>
      <div class="t2">Macro → Meso → Micro &nbsp;·&nbsp; Click any text to edit</div>
    </div>
    <div class="topbar-right">
      <button class="btn-settings" onclick="showSettings()">⚙ Settings</button>
      <div class="progress-wrap">
        <div class="progress-text">
          <div class="prog-lbl">Overall Progress</div>
          <div class="prog-pct">${p}%</div>
          <div class="prog-sub">${doneWks()}/${totalWks()} weeks</div>
        </div>
        <div class="prog-ring" style="background:conic-gradient(#4f46e5 ${deg}deg,rgba(255,255,255,.07) ${deg}deg)">
          <div class="prog-ring-inner"></div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildActionBtns(){
  const hc=HISTORY.length;
  return `<div class="action-btns">
    <button class="btn-a btn-new" onclick="handleNewGoal()">✦ &nbsp;AI Goal Wizard</button>
    <button class="btn-a btn-reset" onclick="handleReset()">↺ &nbsp;Reset Progress</button>
    <button class="btn-a btn-save-h" onclick="handleSaveHistory()">🏆 &nbsp;Save to History</button>
    <button class="btn-a btn-hist" onclick="toggleHistory()">${SHOW_HIST?'▲ Hide':'▼ Show'} Accomplishments${hc>0?`<span class="hist-badge">${hc}</span>`:''}</button>
  </div>`;
}

function buildMacro(){
  const m=S.macro;
  const msList=m.milestones.map((ms,i)=>`
    <div class="ms-row">
      <div class="ms-dot"></div>
      <span class="ms-text">${ev('macro.milestones.'+i,ms)}</span>
      <button class="btn-rm-ms" onclick="removeMilestone(${i})">×</button>
    </div>`).join('');
  return `<div class="macro-panel">
    <div class="macro-glow"></div>
    <div class="macro-left">
      <div class="sec-lbl">🎯 Macrocycle — Big Goal</div>
      <div class="macro-goal-wrap">${ev('macro.goal',m.goal,'style="font-size:27px;font-weight:800;color:#fff"')}</div>
      <div class="macro-tl-wrap">${ev('macro.timeline',m.timeline)}</div>
      <div class="macro-desc-wrap">${ev('macro.description',m.description,{multi:true})}</div>
    </div>
    <div class="macro-right">
      <div class="sec-lbl">🏁 Key Milestones</div>
      ${msList}
      <div class="add-ms-row">
        <input class="add-ms-inp" id="ms-inp" placeholder="+ Add milestone…" onkeydown="if(event.key==='Enter'){event.preventDefault();addMilestone()}" />
        <button class="btn-add-ms" onclick="addMilestone()">Add</button>
      </div>
    </div>
  </div>`;
}

function buildMonthCards(){
  const cards=S.months.map((m,i)=>{
    const s=ts(m.theme);
    const d=m.weeks.filter(w=>w.done).length,t=m.weeks.length;
    const p=t>0?(d/t*100).toFixed(1):0;
    const sel=SEL===i;
    const style=sel?`background:${s.bg};border-color:${s.border};box-shadow:0 6px 32px ${s.glow};`:'';
    const topLine=sel?`<div class="card-topline" style="background:linear-gradient(90deg,transparent,${s.accent},transparent)"></div>`:'';
    const rmBtn=S.months.length>1?`<button class="btn-rm-card" onclick="event.stopPropagation();removeMonth(${i})">×</button>`:'';
    return `<div class="month-card${sel?' selected':''}" style="${style}" onclick="selectMonth(${i})">
      ${topLine}${rmBtn}
      <div class="card-hdr"><span>${esc(m.label)}</span><span>${esc(m.date)}</span></div>
      <div class="card-goal${sel?' sel':''}">${esc(m.goal)}</div>
      <div><span class="card-tag" style="background:${s.tag};color:${s.tagTxt}">${esc(m.theme)}</span></div>
      <div class="card-pb"><div class="card-pf" style="background:${s.accent};width:${p}%"></div></div>
      <div class="card-ps">${d}/${t} weeks</div>
    </div>`;
  }).join('');
  const addBtn=S.months.length<12?`<button class="btn-add-mo" onclick="addMonth()">+ Add Month</button>`:'';
  return `<div class="meso-hdr">
    <div class="meso-lbl">Mesocycle — Monthly Phases (${S.months.length} month${S.months.length!==1?'s':''})</div>
    ${addBtn}
  </div>
  <div class="month-cards" id="mcs">${cards}</div>`;
}

function buildWeekRow(w,wNum,mi,wi){
  const dl=!!w.isDeload;
  const rowBg=dl?'rgba(234,179,8,.07)':'rgba(255,255,255,.025)';
  const rowBd=dl?'rgba(234,179,8,.24)':'rgba(255,255,255,.07)';
  const cbBg=w.done?(dl?'#d97706':'#4f46e5'):'transparent';
  const cbBd=w.done?'transparent':(dl?'rgba(234,179,8,.4)':'rgba(255,255,255,.18)');
  const fc=dl?'#fde68a':(w.done?'rgba(255,255,255,.3)':'#e8eaf0');
  const fd=w.done?'line-through':'none';
  const bc=dl?'#fbbf24':'rgba(255,255,255,.3)';
  const badge=dl?'↓&nbsp;Deload':`Week&nbsp;${wNum}`;
  const tip=w.done?'Click to uncheck':'Click to check off';
  return `<div class="week-row" style="background:${rowBg};border:1px solid ${rowBd}">
    <div class="week-cb" onclick="toggleWeek(${mi},${wi})" title="${tip}" style="background:${cbBg};border-color:${cbBd}">
      ${w.done?'<span style="font-size:11px;color:#fff;font-weight:800;pointer-events:none">✓</span>':''}
    </div>
    <div class="week-badge" style="color:${bc}">${badge}</div>
    <div class="week-content">
      <div class="week-focus" style="color:${fc};text-decoration:${fd}">${ev('months.'+mi+'.weeks.'+wi+'.focus',w.focus)}</div>
      <div class="week-deliv"><span>📦</span>${ev('months.'+mi+'.weeks.'+wi+'.deliverable',w.deliverable)}</div>
    </div>
  </div>`;
}

function buildDetail(){
  const m=S.months[SEL];if(!m)return'';
  const s=ts(m.theme);
  let wn=0;
  const rows=m.weeks.map((w,wi)=>{if(!w.isDeload)wn++;return buildWeekRow(w,wn,SEL,wi)}).join('');
  return `<div class="micro-detail" style="background:${s.bg};border:1px solid ${s.border};box-shadow:0 8px 40px ${s.glow}">
    <div class="micro-hdr">
      <div>
        <div class="micro-mlbl" style="color:${s.accent}">${esc(m.label)} · ${esc(m.date)} &nbsp;·&nbsp; Microcycle</div>
        <div class="micro-goal">${ev('months.'+SEL+'.goal',m.goal)}</div>
      </div>
      <button class="btn-cycle" onclick="cycleTheme(${SEL})" style="background:${s.tag};color:${s.tagTxt};border-color:${s.border}" title="Change phase type">${esc(m.theme)} ↻</button>
    </div>
    <div class="micro-hints">
      <span>☑ Click box to check / uncheck</span>
      <span class="hint-dl">↓ Deload = rest &amp; review week</span>
      <span>✏ Click any text to edit it</span>
    </div>
    ${rows}
  </div>`;
}

function buildLegend(){
  return `<div class="legend">
    ${THEMES.map(t=>`<div class="legend-item"><div class="legend-dot" style="background:${T[t].accent}"></div>${t}</div>`).join('')}
    <div class="legend-item" style="color:rgba(234,179,8,.45);margin-left:8px">↓ Week 4 = Deload</div>
  </div>`;
}

function buildHistory(){
  if(!SHOW_HIST)return'';
  const empty=HISTORY.length===0?`<div class="hist-empty">No saved goals yet. Hit <strong style="color:rgba(255,255,255,.45)">"Save to History"</strong> to record your accomplishments here.</div>`:'';
  const cards=HISTORY.map((h,i)=>{
    const tw=h.months.reduce((a,m)=>a+m.weeks.length,0);
    const dw=h.months.reduce((a,m)=>a+m.weeks.filter(w=>w.done).length,0);
    const p=tw>0?Math.round(dw/tw*100):0;
    const col=p>=80?'#6ee7b7':p>=50?'#fbbf24':'#f87171';
    const cbg=p>=80?'rgba(52,211,153,.12)':p>=50?'rgba(251,191,36,.12)':'rgba(248,113,113,.12)';
    const cbd=p>=80?'rgba(52,211,153,.25)':p>=50?'rgba(251,191,36,.25)':'rgba(248,113,113,.25)';
    const icon=p>=80?'🏆':p>=50?'🎯':'📋';
    return `<div class="hist-card">
      <button class="btn-rm-hist" onclick="removeHistory(${i})">×</button>
      <div class="h-trophy">${icon}</div>
      <div class="h-date">Saved ${fmtDate(h.savedAt)}</div>
      <div class="h-goal">${esc(h.macro.goal)}</div>
      <div class="h-tl">${esc(h.macro.timeline)}</div>
      <div class="h-comp" style="background:${cbg};border:1px solid ${cbd};color:${col}">${p}% complete &nbsp;·&nbsp; ${dw}/${tw} weeks</div>
      <div class="h-pills">${h.months.map(m=>`<span class="h-pill">${esc(m.goal)}</span>`).join('')}</div>
      ${h.macro.milestones.length?`<div class="h-ms">${h.macro.milestones.map(ms=>`<div class="h-ms-item"><span style="color:#4f46e5;font-size:10px">●</span> ${esc(ms)}</div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="history-section">
    <div class="history-title">🏆 Accomplishments <span style="font-size:12px;font-weight:400;color:rgba(255,255,255,.3);margin-left:6px">${HISTORY.length} saved</span></div>
    ${empty}<div class="hist-grid">${cards}</div>
  </div>`;
}

function buildMultiUser(){
  return `<div class="mu-section">
    <div class="mu-title">👥 Using this with friends?</div>
    <div class="mu-sub">Three ways to set this up for daily use with a group — pick the one that fits your comfort level.</div>
    <div class="mu-cards">
      <div class="mu-card">
        <div class="mu-icon">📤</div>
        <div class="mu-card-title">Share the file</div>
        <div class="mu-card-desc">Send this HTML file to your friends via iMessage, email, or a shared folder. Each person opens their own copy. Everyone's progress is private and local.</div>
        <span class="mu-badge" style="background:rgba(52,211,153,.12);color:#6ee7b7;border:1px solid rgba(52,211,153,.25)">Easiest · No setup</span>
      </div>
      <div class="mu-card">
        <div class="mu-icon">🌐</div>
        <div class="mu-card-title">Host on Netlify (recommended)</div>
        <div class="mu-card-desc">Everyone visits the same link from any device. Free, takes ~2 minutes to set up.</div>
        <span class="mu-badge" style="background:rgba(99,102,241,.12);color:#a5b4fc;border:1px solid rgba(99,102,241,.25)">Free · 2 min setup</span>
        <ol class="mu-steps">
          <li>Go to <strong style="color:#a5b4fc">netlify.com</strong> → sign up free</li>
          <li>Click "Add new site" → "Deploy manually"</li>
          <li>Drag this HTML file into the upload box</li>
          <li>Share the link Netlify gives you</li>
        </ol>
      </div>
      <div class="mu-card">
        <div class="mu-icon">🔄</div>
        <div class="mu-card-title">Full multi-user app</div>
        <div class="mu-card-desc">Synced across devices, multiple profiles, see each other's goals. Requires a free Supabase database — ask me to build this when you're ready.</div>
        <span class="mu-badge" style="background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25)">Most powerful · Some setup</span>
      </div>
    </div>
  </div>`;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render(){
  const sc=document.getElementById('mcs');
  const sl=sc?sc.scrollLeft:0;
  document.getElementById('app').innerHTML=
    buildTopBar()+buildActionBtns()+buildMacro()+buildMonthCards()+buildDetail()+buildLegend()+'<div style="margin-top:40px;border-top:1px solid rgba(255,255,255,.06);padding-top:32px">'+buildHistory()+buildMultiUser()+'</div>';
  const sc2=document.getElementById('mcs');
  if(sc2)sc2.scrollLeft=sl;
}

// ── Welcome screen ─────────────────────────────────────────────────────────────
function showWelcome(){
  document.getElementById('wiz-root').innerHTML=`
  <div class="welcome-ov" id="welcome-ov">
    <div class="welcome-box">
      <div class="welcome-glow"></div>
      <div class="welcome-tag">Goal Periodization System</div>
      <div class="welcome-title">Turn ambition into<br><span>a real plan.</span></div>
      <div class="welcome-sub">Structure any goal — fitness, career, creative, business — the same way elite athletes train. Break it into monthly phases, weekly focus, and built-in rest.</div>
      <div class="welcome-features">
        <div class="welcome-feat"><strong>🎯 Macrocycle</strong>Your big goal & milestones</div>
        <div class="welcome-feat"><strong>📅 Mesocycle</strong>Monthly themes & phases</div>
        <div class="welcome-feat"><strong>⚡ Microcycle</strong>Weekly focus & deliverables</div>
      </div>
      <button class="welcome-cta" onclick="dismissWelcome(true)">✦ &nbsp;Build my plan with AI</button>
      <button class="welcome-skip" onclick="dismissWelcome(false)">Skip — take me to the dashboard →</button>
    </div>
  </div>`;
}

function dismissWelcome(openAI){
  const el=document.getElementById('welcome-ov');
  if(el){
    el.style.animation='fadeOut .2s ease forwards';
    setTimeout(()=>{
      document.getElementById('wiz-root').innerHTML='';
      if(openAI) handleNewGoal();
    },180);
  }
}

// Add fadeOut keyframe dynamically
const _s=document.createElement('style');
_s.textContent='@keyframes fadeOut{from{opacity:1}to{opacity:0}}';
document.head.appendChild(_s);

render();
showWelcome();
</script>
</body>
</html>
